<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | Nuvix</title>
  <style>
    :root {
      --background: #07091a;
      --foreground: #f3f4f6;
      --primary: #4f46e5;
      --primary-mid: #6366f1;
      --cyan: #06b6d4;
      --card-bg: rgba(13, 16, 39, 0.75);
      --border-color: rgba(99, 102, 241, 0.18);
      --text-muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient background glows */
    .glow-1 {
      position: absolute;
      top: -10%;
      right: -10%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.12) 0%, transparent 70%);
      filter: blur(80px);
      z-index: 1;
      pointer-events: none;
    }

    .glow-2 {
      position: absolute;
      bottom: -10%;
      left: -10%;
      width: 450px;
      height: 450px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6, 182, 212, 0.08) 0%, transparent 70%);
      filter: blur(90px);
      z-index: 1;
      pointer-events: none;
    }

    /* Grid backdrop */
    .grid-backdrop {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 2;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 460px;
      padding: 40px 30px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      text-align: center;
      animation: floatIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes floatIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Styled offline illustration */
    .icon-container {
      position: relative;
      width: 96px;
      height: 96px;
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(79, 70, 229, 0.15), rgba(6, 182, 212, 0.1));
      border-radius: 50%;
      border: 1px solid rgba(99, 102, 241, 0.25);
      animation: pulseGlow 2.5s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(79, 70, 229, 0.2);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 20px 8px rgba(79, 70, 229, 0.08);
        transform: scale(1.03);
      }
    }

    .icon-svg {
      width: 42px;
      height: 42px;
      color: var(--cyan);
      z-index: 2;
    }

    .alert-svg {
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 24px;
      height: 24px;
      background: #ef4444;
      color: white;
      border-radius: 50%;
      border: 3px solid #0d1027;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: bold;
      z-index: 3;
    }

    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .btn-retry {
      width: 100%;
      padding: 14px 28px;
      background: linear-gradient(135deg, var(--primary), var(--primary-mid));
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(79, 70, 229, 0.35);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-retry:hover {
      background: linear-gradient(135deg, #4338ca, var(--primary));
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.45);
      transform: translateY(-1px);
    }

    .btn-retry:active {
      transform: scale(0.98);
    }

    /* Subtext status check */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      color: #ef4444;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.15);
      padding: 4px 10px;
      border-radius: 999px;
      margin-top: 24px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background-color: #ef4444;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="grid-backdrop"></div>

  <div class="container">
    <div class="icon-container">
      <div class="icon-bg"></div>
      <!-- SVG Cloud Offline Icon -->
      <svg class="icon-svg" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15a4.5 4.5 0 0 0 4.5 4.5H18a3.75 3.75 0 0 0 1.332-7.257 3 3 0 0 0-3.758-3.848 5.25 5.25 0 0 0-10.233 2.33A4.502 4.502 0 0 0 2.25 15Z" />
      </svg>
      <div class="alert-svg">!</div>
    </div>

    <h1>Connection Lost</h1>
    <p>We couldn't connect to Nuvix servers. Please check your wi-fi or mobile data and try again.</p>

    <button class="btn-retry" onclick="retryConnection()">
      <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
      </svg>
      Retry Connection
    </button>

    <div class="status-badge">
      <div class="status-dot"></div>
      Offline Mode Active
    </div>
  </div>

  <script>
    function retryConnection() {
      const button = document.querySelector('.btn-retry');
      button.style.opacity = '0.7';
      button.innerHTML = 'Retrying...';
      
      // Let it spin/wait slightly for natural feel
      setTimeout(() => {
        if (navigator.onLine) {
          window.location.reload();
        } else {
          button.style.opacity = '1';
          button.innerHTML = `
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
            Retry Connection
          `;
          
          // Subtle shake animation
          const container = document.querySelector('.container');
          container.style.animation = 'none';
          container.offsetHeight; // Trigger reflow
          container.style.animation = 'shake 0.4s ease';
        }
      }, 600);
    }

    // Add keyframe for shake on fail
    const style = document.createElement('style');
    style.innerHTML = `
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        75% { transform: translateX(6px); }
      }
    `;
    document.head.appendChild(style);

    // Auto reload if connection comes back online
    window.addEventListener('online', () => {
      window.location.reload();
    });
  </script>
</body>
</html>
